baseURL = "https://redcelery.github.io/"
languageCode = "zh-cn"
defaultContentLanguage = "zh"
title = "Red Celery"

theme = "PaperMod"

[pagination]
  pagerSize = 10

[params]
  env = "production"
  description = "科研笔记与项目想法"
  author = "Red Celery"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  defaultTheme = "auto"

[params.homeInfoParams]
  Title = "你好 👋"
  Content = "这里用来记录科研阅读和项目里冒出来的想法。"

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 20

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]
